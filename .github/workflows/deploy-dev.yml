name: Deploy MCP Server

on:
  push:
    branches:
      - master
      - fix/arcitecture-edits-for-deployment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check if dependencies changed
        id: deps
        run: |
          if git diff HEAD~1 --name-only | grep -qE '^(requirements\.txt|Dockerfile)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # --- Full rebuild (only when Dockerfile or requirements.txt change) ---

      - name: Full rebuild and redeploy on VM
        if: steps.deps.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY,DEPLOY_BRANCH
          script: |
            cd /opt/incorta-upgrade-assistant
            git init 2>/dev/null || true
            git remote remove origin 2>/dev/null || true
            git remote add origin https://${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            git fetch origin ${DEPLOY_BRANCH}
            git reset --hard origin/${DEPLOY_BRANCH}

            # Build new image
            docker build -t incorta-upgrade-assistant:latest .

            # Stop and remove old container
            docker stop incorta-upgrade-assistant || true
            docker rm incorta-upgrade-assistant || true

            # Start new container with same env vars and port
            mkdir -p /opt/incorta-upgrade-assistant/data
            docker run -d --name incorta-upgrade-assistant \
              --restart unless-stopped \
              -p 9094:8080 \
              --env-file /opt/incorta-upgrade-assistant/.env \
              -v /opt/incorta-upgrade-assistant/data:/app/data \
              incorta-upgrade-assistant:latest
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}

      # --- Hot reload (code-only changes, no Docker rebuild) ---

      - name: Hot reload code on VM
        if: steps.deps.outputs.changed == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY,DEPLOY_BRANCH
          script: |
            cd /opt/incorta-upgrade-assistant
            git init 2>/dev/null || true
            git remote remove origin 2>/dev/null || true
            git remote add origin https://${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            git fetch origin ${DEPLOY_BRANCH}
            git reset --hard origin/${DEPLOY_BRANCH}

            # Copy updated code into the running container and restart
            docker cp /opt/incorta-upgrade-assistant/. incorta-upgrade-assistant:/app/
            docker restart incorta-upgrade-assistant
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
