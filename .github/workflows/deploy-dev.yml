name: Build and Deploy Dev MCP

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:dev

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:dev
            docker stop incorta-upgrade-agent-dev || true
            docker rm incorta-upgrade-agent-dev || true
            docker run -d --name incorta-upgrade-agent-dev -p 8000:8000 \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:dev
