name: Deploy MCP Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check if dependencies changed
        id: deps
        run: |
          if git diff HEAD~1 --name-only | grep -qE '^(requirements\.txt|Dockerfile)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # --- Full rebuild (only when Dockerfile or requirements.txt change) ---

      - name: Set up Docker Buildx
        if: steps.deps.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.deps.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.deps.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:latest

      - name: Deploy new image to VM
        if: steps.deps.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:latest
            docker stop incorta-upgrade-agent || true
            docker rm incorta-upgrade-agent || true
            docker run -d --name incorta-upgrade-agent -p 8000:8080 \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              -v /opt/incorta-upgrade-agent/app:/app \
              ${{ secrets.DOCKERHUB_USERNAME }}/incorta-upgrade-agent:latest
            # Seed the volume with the latest code
            docker cp incorta-upgrade-agent:/app/. /opt/incorta-upgrade-agent/app/ 2>/dev/null || true
            cd /opt/incorta-upgrade-agent/app && git init && git remote add origin https://github.com/${{ github.repository }}.git 2>/dev/null || true
            cd /opt/incorta-upgrade-agent/app && git fetch origin master && git reset --hard origin/master

      # --- Hot reload (code-only changes, no Docker rebuild) ---

      - name: Hot reload code on VM
        if: steps.deps.outputs.changed == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            # Pull latest code into the mounted volume
            cd /opt/incorta-upgrade-agent/app

            # Initialize git repo if first run
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            git fetch origin master
            git reset --hard origin/master

            # Restart the container to pick up changes
            docker restart incorta-upgrade-agent
